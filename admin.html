<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&D Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Metamorphous&family=Cormorant+SC:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .drop-card { background: var(--bg-secondary); border: 1px solid var(--accent); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1rem 0; }
        .btn-save { background: var(--fungus); color: white; border: none; padding: 0.75rem 1.5rem; cursor: pointer; font-family: var(--font-display); }
        .btn-delete { background: var(--lava); color: white; border: none; padding: 0.5rem 1rem; cursor: pointer; }
        .btn-add { background: var(--ocean); color: white; border: none; padding: 1rem 2rem; cursor: pointer; font-family: var(--font-display); font-size: 1.1rem; margin-bottom: 2rem; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 12px; font-size: 0.8rem; margin-left: 0.5rem; }
        .status-locked { background: var(--lava); }
        .status-unlocked { background: var(--fungus); }
        .status-hidden { background: var(--spirit); }
        .loading { color: var(--text-secondary); font-style: italic; }
        .error { color: var(--lava); }
    </style>
</head>
<body>
    <!-- Admin Nav -->
    <nav class="navbar admin-nav">
        <a href="index.html" class="logo-link">
            <div class="logo font-display">K&D Control</div>
        </a>
        <a href="index.html" class="nav-logo-right">
            <img src="assets/logo-icon.png" alt="K&D">
        </a>
        <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">☰</button>
        <div class="nav-links" id="navLinks">
            <div class="dropdown">
                <a href="factions.html">Factions</a>
                <div class="dropdown-content">
                    <a href="set-fehu.html">Fehu</a>
                    <a href="set-godrin.html">Coming Soon</a>
                </div>
            </div>
            <a href="vault.html">Vault</a>
            <a href="whispers.html">Whispers</a>
            <a href="qa.html">Q&A</a>
            <a href="contact.html">Contact</a>
            <a href="admin.html" id="adminLink" class="admin-link" style="display: none;">Admin Portal</a>
            <a href="login.html" id="authBtn" class="btn-login">Sign In</a>
        </div>
    </nav>

    <div class="admin-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h1 class="font-display">Vault Control</h1>
            <div id="adminStatus" class="loading">Checking access...</div>
        </div>

        <div id="loadingState" style="text-align: center; padding: 3rem;">
            <p class="loading">Verifying credentials...</p>
        </div>

        <div id="loginForm" style="display: none; max-width: 400px; margin: 0 auto; text-align: center;">
            <h3>Authentication Required</h3>
            <p style="color: var(--text-secondary); margin-bottom: 1rem;">Admin access only.</p>
            <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; margin: 0.5rem 0;">
            <input type="password" id="loginPass" placeholder="Password" style="width: 100%; margin: 0.5rem 0;">
            <button onclick="signInUser()" class="btn-save" style="width: 100%; margin-top: 1rem;">Sign In</button>
            <a href="index.html" style="display: block; margin-top: 1rem; color: var(--text-secondary);">← Return to Site</a>
        </div>

        <div id="accessDenied" style="display: none; text-align: center; padding: 3rem;">
            <h3 class="error">Access Denied</h3>
            <p style="color: var(--text-secondary);">You do not have admin privileges.</p>
            <a href="index.html" style="display: inline-block; margin-top: 1rem; color: var(--card-light-purple);">Return to Site</a>
        </div>

        <div id="adminPanel" style="display: none;">
            <button onclick="showAddForm()" class="btn-add">+ Schedule New Drop</button>
            
            <div id="addForm" style="display: none; background: var(--bg-secondary); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid var(--accent);">
                <h3 class="font-display">New Drop</h3>
                <div class="form-grid">
                    <input type="text" id="newTitle" placeholder="Title">
                    <select id="newType">
                        <option value="faction">Faction</option>
                        <option value="vault">Vault Card</option>
                        <option value="timeline">Timeline Event</option>
                        <option value="hero">Hero Section</option>
                    </select>
                    <input type="datetime-local" id="newDate">
                    <input type="text" id="newImage" placeholder="Image path" value="assets/cards/card-back.png">
                    <input type="number" id="newBlur" placeholder="Blur px" value="8">
                    <input type="number" id="newOrder" placeholder="Sort Order" value="0">
                    <textarea id="newDesc" placeholder="Description" style="grid-column: span 2;"></textarea>
                </div>
                <button onclick="addDrop()" class="btn-save" style="margin-top: 1rem;">Create Drop</button>
                <button onclick="hideAddForm()" style="margin-left: 1rem;">Cancel</button>
            </div>

            <div id="dropsList"></div>
        </div>
    </div>

    <script type="module">
        import { signIn, signOut, isAdmin, getAllDropsAdmin, updateDrop, createDrop, deleteDrop, supabase } from './js/supabase.js';

        async function checkAuth() {
            try {
                // First check if we have a session
                const { data: { session }, error: sessionError } = await supabase.auth.getSession();
                
                if (sessionError) {
                    console.error('Session error:', sessionError);
                    showLogin();
                    return;
                }

                // If no session, show login
                if (!session) {
                    console.log('No session found');
                    showLogin();
                    return;
                }

                console.log('Session found:', session.user.email);
                
                // We have a session, now check if user is admin
                const { data: { user } } = await supabase.auth.getUser();
                
                if (!user) {
                    console.log('No user data');
                    showLogin();
                    return;
                }

                // Check admin status
                const admin = await isAdmin();
                console.log('Admin check result:', admin);

                if (admin) {
                    showAdminPanel();
                    loadDrops();
                } else {
                    showAccessDenied();
                }
            } catch (err) {
                console.error('Auth check failed:', err);
                showLogin();
            }
        }

        function showLoading() {
            document.getElementById('loadingState').style.display = 'block';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('accessDenied').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminStatus').textContent = 'Checking access...';
            document.getElementById('adminStatus').className = 'loading';
        }

        function showLogin() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('accessDenied').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminStatus').innerHTML = '<span class="error">Not signed in</span>';
        }

        function showAccessDenied() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('accessDenied').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminStatus').innerHTML = '<span class="error">Access Denied</span>';
        }

        function showAdminPanel() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('accessDenied').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminStatus').innerHTML = '<span style="color: var(--fungus)">Access Granted</span>';
            
            // Update navbar auth button
            const authBtn = document.getElementById('authBtn');
            if (authBtn) {
                authBtn.textContent = 'Sign Out';
                authBtn.href = '#';
                authBtn.onclick = async (e) => {
                    e.preventDefault();
                    await signOut();
                    window.location.href = 'index.html';
                };
            }
        }

        window.signInUser = async () => {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            
            showLoading();
            
            const { error } = await signIn(email, pass);
            if (error) {
                alert('Access denied: ' + error.message);
                showLogin();
            } else {
                // Recheck auth after sign in
                await checkAuth();
            }
        };

        async function loadDrops() {
            const drops = await getAllDropsAdmin();
            const container = document.getElementById('dropsList');
            
            if (!drops || drops.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: var(--text-secondary);">No drops scheduled.</p>';
                return;
            }
            
            container.innerHTML = drops.map(drop => {
                const isLocked = new Date(drop.unlock_at) > new Date();
                const statusText = !drop.is_visible ? 'HIDDEN' : (isLocked ? 'LOCKED' : 'UNLOCKED');
                const badgeClass = !drop.is_visible ? 'status-hidden' : (isLocked ? 'status-locked' : 'status-unlocked');
                
                return `
                <div class="drop-card" data-id="${drop.id}">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
                        <h4 class="font-display">${drop.title} <span class="status-badge ${badgeClass}">${statusText}</span></h4>
                        <button onclick="deleteThis('${drop.id}')" class="btn-delete">Delete</button>
                    </div>
                    <div class="form-grid">
                        <input type="text" class="edit-title" value="${drop.title}">
                        <select class="edit-type">
                            <option value="faction" ${drop.drop_type === 'faction' ? 'selected' : ''}>Faction</option>
                            <option value="vault" ${drop.drop_type === 'vault' ? 'selected' : ''}>Vault</option>
                            <option value="timeline" ${drop.drop_type === 'timeline' ? 'selected' : ''}>Timeline</option>
                            <option value="hero" ${drop.drop_type === 'hero' ? 'selected' : ''}>Hero</option>
                        </select>
                        <input type="datetime-local" class="edit-date" value="${drop.unlock_at ? drop.unlock_at.slice(0, 16) : ''}">
                        <input type="text" class="edit-image" value="${drop.image_url || ''}">
                        <input type="number" class="edit-blur" value="${drop.blur_level || 0}">
                        <input type="number" class="edit-order" value="${drop.sort_order || 0}">
                        <label style="grid-column: span 2;">
                            <input type="checkbox" class="edit-visible" ${drop.is_visible ? 'checked' : ''}> Visible on site
                        </label>
                        <textarea class="edit-desc" style="grid-column: span 2;">${drop.description || ''}</textarea>
                    </div>
                    <button onclick="saveThis('${drop.id}')" class="btn-save" style="margin-top: 1rem;">Save Changes</button>
                </div>
                `;
            }).join('');
        }

        window.saveThis = async (id) => {
            const card = document.querySelector(`[data-id="${id}"]`);
            const updates = {
                title: card.querySelector('.edit-title').value,
                drop_type: card.querySelector('.edit-type').value,
                unlock_at: new Date(card.querySelector('.edit-date').value).toISOString(),
                image_url: card.querySelector('.edit-image').value,
                blur_level: parseInt(card.querySelector('.edit-blur').value),
                sort_order: parseInt(card.querySelector('.edit-order').value),
                is_visible: card.querySelector('.edit-visible').checked,
                description: card.querySelector('.edit-desc').value
            };
            
            const { error } = await updateDrop(id, updates);
            if (error) alert('Error: ' + error.message);
            else { 
                alert('Updated!'); 
                loadDrops(); 
            }
        };

        window.deleteThis = async (id) => {
            if (!confirm('Delete this drop?')) return;
            const { error } = await deleteDrop(id);
            if (error) alert('Error: ' + error.message);
            else loadDrops();
        };

        window.showAddForm = () => document.getElementById('addForm').style.display = 'block';
        window.hideAddForm = () => document.getElementById('addForm').style.display = 'none';

        window.addDrop = async () => {
            const drop = {
                title: document.getElementById('newTitle').value,
                drop_type: document.getElementById('newType').value,
                unlock_at: new Date(document.getElementById('newDate').value).toISOString(),
                image_url: document.getElementById('newImage').value,
                blur_level: parseInt(document.getElementById('newBlur').value),
                sort_order: parseInt(document.getElementById('newOrder').value),
                description: document.getElementById('newDesc').value,
                is_visible: true
            };
            
            const { error } = await createDrop(drop);
            if (error) alert('Error: ' + error.message);
            else { 
                hideAddForm(); 
                loadDrops(); 
            }
        };

        // Mobile nav toggle
        window.toggleNav = () => {
            document.getElementById('navLinks').classList.toggle('active');
        };

        // Initialize
        checkAuth();
        
        // Listen for auth changes
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth state changed:', event);
            if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') {
                checkAuth();
            }
        });
    </script>
</body>
</html>
