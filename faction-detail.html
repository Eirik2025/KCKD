<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faction - Kloak & Daggurrs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Metamorphous&family=Cormorant+SC:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .faction-hero { text-align: center; padding: 4rem 2rem; background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%); }
        .faction-sigil-large { width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 2rem; border: 4px solid; box-shadow: 0 0 30px currentColor; }
        .faction-title { font-family: var(--font-display); font-size: 3.5rem; margin-bottom: 1rem; }
        .faction-tagline { font-family: 'Josefin Sans', sans-serif; font-weight: 300; font-style: italic; font-size: 1.3rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 2rem; }
        .story-section { max-width: 800px; margin: 0 auto; padding: 3rem 2rem; }
        .story-content { font-family: 'Josefin Sans', sans-serif; font-weight: 300; font-size: 1.1rem; line-height: 1.9; color: var(--text-secondary); }
        .story-content p { margin-bottom: 1.5rem; }
        .locked-view { text-align: center; padding: 5rem 2rem; }
        .seal-large { width: 150px; height: 150px; border: 3px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 2rem; font-size: 4rem; }
        .locked-title { opacity: 0.3; filter: blur(4px); }
        .teaser-view { text-align: center; padding: 4rem 2rem; border: 1px solid var(--sun); border-radius: 16px; margin: 2rem; background: rgba(255, 215, 0, 0.05); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-link"><div class="logo font-display">Kloak & Daggurrs</div></a>
        <a href="index.html" class="nav-logo-right"><img src="assets/logo-icon.png" alt="K&D"></a>
        <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">☰</button>
        <div class="nav-links" id="navLinks">
            <div class="dropdown">
                <a href="factions.html">Factions</a>
                <div class="dropdown-content">
                    <a href="set-fehu.html">Fehu</a>
                    <a href="set-godrin.html">Coming Soon</a>
                </div>
            </div>
            <a href="vault.html">Vault</a>
            <a href="whispers.html">Whispers</a>
            <a href="qa.html">Q&A</a>
            <a href="contact.html">Contact</a>
            <a href="admin.html" id="adminLink" class="admin-link" style="display: none;">Admin Portal</a>
            <a href="login.html" id="authBtn" class="btn-login">Sign In</a>
        </div>
    </nav>

    <div id="contentContainer">
        <!-- Content loaded dynamically -->
    </div>

    <footer>
        <p class="font-display">Kloak & Daggurrs</p>
        <span>All secrets have a price.</span>
    </footer>

    <script type="module">
        import { getFaction, getFactionDrops, isAdmin, getDropStatus } from './js/supabase.js';

        async function loadFactionDetail() {
            const params = new URLSearchParams(window.location.search);
            const factionId = params.get('id');
            
            if (!factionId) {
                window.location.href = 'factions.html';
                return;
            }

            const faction = await getFaction(factionId);
            if (!faction) {
                document.getElementById('contentContainer').innerHTML = '<div class="page-content"><h2>Faction not found</h2></div>';
                return;
            }

            const drops = await getFactionDrops(factionId);
            const status = getDropStatus(drops[0] || {}); // Check first drop for status
            const isAdminUser = await isAdmin();

            const container = document.getElementById('contentContainer');
            
            // Determine view based on status
            let view = 'locked';
            if (isAdminUser || status.state === 'unlocked') view = 'unlocked';
            else if (status.state === 'teaser') view = 'teaser';

            if (view === 'locked') {
                container.innerHTML = `
                    <div class="locked-view">
                        <div class="seal-large" style="border-color: ${faction.sigil_color || 'var(--accent)'}; color: ${faction.sigil_color || 'var(--accent)'};">&#128274;</div>
                        <h1 class="faction-title locked-title">${faction.name}</h1>
                        <p style="color: var(--text-secondary);">This faction remains sealed.</p>
                    </div>
                `;
            } else if (view === 'teaser') {
                container.innerHTML = `
                    <div class="teaser-view">
                        <div class="faction-sigil-large" style="background: ${faction.sigil_color}; border-color: ${faction.sigil_color}; color: ${faction.sigil_color};"></div>
                        <h1 class="faction-title" style="color: var(--sun);">${faction.name}</h1>
                        <p class="faction-tagline">${faction.tagline}</p>
                        <p style="color: var(--text-secondary);">Full lore coming soon...</p>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="faction-hero">
                        <div class="faction-sigil-large" style="background: ${faction.sigil_color}; border-color: ${faction.sigil_color}; color: ${faction.sigil_color};"></div>
                        <h1 class="faction-title" style="color: ${faction.sigil_color};">${faction.name}</h1>
                        <p class="faction-tagline">${faction.tagline}</p>
                    </div>
                    <div class="story-section">
                        <div class="story-content">
                            ${faction.story_content || '<p>The full story of this faction has yet to be written...</p>'}
                        </div>
                    </div>
                    <div class="page-content">
                        <h3 class="font-display" style="text-align: center; margin-bottom: 2rem;">Available Cards</h3>
                        <div class="collection-grid" id="factionCards">
                            <!-- Cards would be loaded here -->
                        </div>
                    </div>
                `;
            }
        }

        window.toggleNav = () => {
            document.getElementById('navLinks').classList.toggle('active');
        };

        loadFactionDetail();
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
