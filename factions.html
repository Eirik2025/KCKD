<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thirteen Shadows - K&D</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-link">
    <div class="logo font-display">Kloak & Daggurrs</div>
</a>
<a href="index.html" class="nav-logo-right">
    <img src="assets/logo-icon.png" alt="K&D">
</a>
        <div class="nav-links">
            <a href="factions.html" class="active">Factions</a>
            <a href="vault.html">Vault</a>
            <a href="whispers.html">Whispers</a>
            <a href="qa.html">Q&A</a>
            <a href="contact.html">Contact</a>
            <a href="admin.html" id="adminLink" class="admin-link" style="display: none;">Admin Portal</a>
            <a href="login.html" id="authBtn" class="btn-login">Sign In</a>
        </div>
    </nav>

    <main class="page-content">
        <div class="page-header">
            <h2>The Thirteen Shadows</h2>
            <p style="color: var(--text-secondary);">Power takes many forms. Choose carefully.</p>
        </div>
        <div class="faction-grid">
            <!-- Example: Chaos -->
            <div class="faction-card" data-faction="chaos">
                <div class="faction-sigil" style="background: var(--chaos-primary); border-color: var(--chaos-secondary);"></div>
                <span class="faction-name text-chaos">Chaos</span>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">Circles of destruction.</p>
                <div class="faction-lock locked" data-unlock="2026-05-01">
                    <span class="lock-date">Sealed until May 1st</span>
                </div>
            </div>
            <!-- Add Earth, Fairy, etc. same pattern -->
            <div class="faction-card" data-faction="earth">
                <div class="faction-sigil" style="background: var(--earth); border-color: #5a3a2a;"></div>
                <span class="faction-name" style="color: var(--earth);">Earth</span>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem;">Unyielding stone.</p>
                <div class="faction-lock locked" data-unlock="2026-05-15">
                    <span class="lock-date">Sealed until May 15th</span>
                </div>
            </div>
            <!-- Add remaining factions... -->
            <div class="faction-card locked-faction" data-faction="mystery">
                <div class="faction-sigil unknown"></div>
                <span class="faction-name">???</span>
                <div class="faction-lock locked">
                    <span class="lock-date">Unknown</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p class="font-display">Kloak & Daggurrs</p>
        <span>All secrets have a price.</span>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
