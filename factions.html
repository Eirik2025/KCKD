<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thirteen Shadows - K&D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=Metamorphous&family=Cormorant+SC:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .faction-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
        .faction-card { background: var(--bg-secondary); border: 2px solid var(--accent); border-radius: 12px; padding: 2rem 1rem; text-align: center; position: relative; overflow: hidden; transition: all 0.3s; cursor: pointer; text-decoration: none; color: inherit; }
        .faction-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(96, 54, 170, 0.3); }
        .faction-sigil { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 1rem; border: 3px solid; transition: all 0.3s; }
        .faction-card:hover .faction-sigil { transform: scale(1.1); }
        .faction-name { font-family: var(--font-display); font-size: 1.3rem; color: var(--card-beige); }
        .faction-tagline { font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; font-style: italic; }
        .faction-lock { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10, 10, 15, 0.9); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); transition: opacity 0.5s; }
        .faction-lock.unlocked { opacity: 0; pointer-events: none; }
        .faction-lock.teaser { background: rgba(10, 10, 15, 0.7); }
        .lock-date { font-family: var(--font-display); color: var(--card-light-purple); font-size: 0.9rem; text-align: center; padding: 1rem; }
        .teaser-text { color: var(--sun); font-size: 0.8rem; margin-top: 0.5rem; }
        .loading-factions { text-align: center; padding: 3rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-link"><div class="logo font-display">Kloak & Daggurrs</div></a>
        <a href="index.html" class="nav-logo-right"><img src="assets/logo-icon.png" alt="K&D"></a>
        <button class="nav-toggle" onclick="toggleNav()" aria-label="Menu">☰</button>
        <div class="nav-links" id="navLinks">
            <div class="dropdown">
                <a href="factions.html">Factions</a>
                <div class="dropdown-content">
                    <a href="set-fehu.html">Fehu</a>
                    <a href="set-godrin.html">Coming Soon</a>
                </div>
            </div>
            <a href="vault.html">Vault</a>
            <a href="whispers.html">Whispers</a>
            <a href="qa.html">Q&A</a>
            <a href="contact.html">Contact</a>
            <a href="admin.html" id="adminLink" class="admin-link" style="display: none;">Admin Portal</a>
            <a href="login.html" id="authBtn" class="btn-login">Sign In</a>
        </div>
    </nav>

    <main class="page-content">
        <div class="page-header">
            <h2>The Thirteen Shadows</h2>
            <p style="color: var(--text-secondary);">Power takes many forms. Choose carefully.</p>
        </div>
        
        <div id="factionsContainer" class="faction-grid">
            <div class="loading-factions">Summoning factions...</div>
        </div>
    </main>

    <footer>
        <p class="font-display">Kloak & Daggurrs</p>
        <span>All secrets have a price.</span>
    </footer>

    <script type="module">
        import { getFactions, getFactionDrops, isAdmin, supabase } from './js/supabase.js';

        async function loadFactions() {
            const container = document.getElementById('factionsContainer');
            const factions = await getDrops('faction'); // Use drops table, not faction_lore
            
            if (!factions || factions.length === 0) {
                container.innerHTML = '<div class="loading-factions">No factions found.</div>';
                return;
            }

            const { data: { user } } = await supabase.auth.getUser();
            const isAdminUser = user ? await isAdmin() : false;

            container.innerHTML = factions.map(faction => {
                const status = getDropStatus(faction);
                const isLocked = status.state === 'locked' && !isAdminUser;
                const isTeaser = status.state === 'teaser';
                
                const lockClass = isLocked ? '' : (isTeaser ? 'teaser' : 'unlocked');
                const lockDisplay = isLocked ? 'flex' : (isTeaser ? 'flex' : 'none');
                
                // Format dates for display
                const teaserDate = faction.teaser_at ? new Date(faction.teaser_at).toLocaleDateString() : 'Soon';
                const unlockDate = faction.unlock_at ? new Date(faction.unlock_at).toLocaleDateString() : 'Soon';

                return `
                <a href="faction-detail.html?id=${faction.id}" class="faction-card" data-faction="${faction.id}">
                    <div class="faction-sigil" style="background: ${faction.image_url || 'var(--spirit)'}; border-color: ${faction.image_url || 'var(--card-gold)'};"></div>
                    <span class="faction-name">${faction.title}</span>
                    <p class="faction-tagline">${faction.description || 'Secrets yet to be revealed...'}</p>
                    <div class="faction-lock ${lockClass}" style="display: ${lockDisplay};">
                        <span class="lock-date">
                            ${isTeaser ? `Teaser until ${unlockDate}<div class="teaser-text">Preview available</div>` : `Sealed until ${teaserDate}`}
                        </span>
                    </div>
                </a>
                `;
            }).join('');
        }

        window.toggleNav = () => {
            document.getElementById('navLinks').classList.toggle('active');
        };

        loadFactions();
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
